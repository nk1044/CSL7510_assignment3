version: '3'

services:
  api:
    build: ./api
    container_name: api
    ports:
      - "5000:5000"

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - api

  monitoring:
    build:
      context: ./monitoring
      dockerfile: ../api/Dockerfile
    container_name: monitoring
    depends_on:
      - scaler

  scaler:
    build:
      context: ./scaler
      dockerfile: ../api/Dockerfile
    container_name: scaler
    ports:
      - "6000:6000"